name: Sync Submodules From Main

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULE_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Update submodules to latest main
        run: |
          set -e
          git submodule sync --recursive
          git submodule update --init --recursive --remote

      - name: Commit and push if changed
        run: |
          set -e
          if git diff --quiet -- .gitmodules my-family-api my-family-web my-family-web-admin; then
            echo "No submodule updates"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitmodules my-family-api my-family-web my-family-web-admin
          git commit -m "chore: sync submodules to latest main"
          git push origin HEAD:main
