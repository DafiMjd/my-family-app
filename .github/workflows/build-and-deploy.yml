name: Build and Deploy Containers

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/fam

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, web-admin]
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Docker context and image name
        id: prep
        run: |
          case "${{ matrix.service }}" in
            api)
              echo "context=my-family-api" >> "$GITHUB_OUTPUT"
              echo "image=api" >> "$GITHUB_OUTPUT"
              ;;
            web)
              echo "context=my-family-web" >> "$GITHUB_OUTPUT"
              echo "image=web" >> "$GITHUB_OUTPUT"
              ;;
            web-admin)
              echo "context=my-family-web-admin" >> "$GITHUB_OUTPUT"
              echo "image=web-admin" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.prep.outputs.context }}
          file: ${{ steps.prep.outputs.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}

  deploy-hostinger:
    if: ${{ github.ref == 'refs/heads/main' && secrets.HOSTINGER_HOST != '' && secrets.HOSTINGER_USER != '' && secrets.HOSTINGER_SSH_KEY != '' && secrets.HOSTINGER_APP_PATH != '' && secrets.HOSTINGER_GHCR_USER != '' && secrets.HOSTINGER_GHCR_TOKEN != '' }}
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on Hostinger over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.HOSTINGER_APP_PATH }}"
            echo "${{ secrets.HOSTINGER_GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.HOSTINGER_GHCR_USER }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
